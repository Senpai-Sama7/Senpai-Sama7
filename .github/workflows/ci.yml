name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  CACHE_VERSION: v1

jobs:
  # Quality gates and linting
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pre-commit
      
      - name: Install Node.js dependencies
        run: npm ci
      
      - name: Cache pre-commit
        uses: actions/cache@v3
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ env.CACHE_VERSION }}-${{ hashFiles('.pre-commit-config.yaml') }}
      
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
      
      - name: Python type checking
        run: mypy scripts/
      
      - name: TypeScript type checking
        run: npm run type-check
      
      - name: ESLint
        run: npm run lint
      
      - name: Python linting summary
        run: |
          echo "## Python Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Black formatting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ isort import sorting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ flake8 linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ mypy type checking" >> $GITHUB_STEP_SUMMARY
      
      - name: TypeScript linting summary
        run: |
          echo "## TypeScript Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ TypeScript compilation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Prettier formatting" >> $GITHUB_STEP_SUMMARY

  # Security scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety
      
      - name: Run Bandit security scan
        run: |
          bandit -r scripts/ -f json -o bandit-report.json || true
          bandit -r scripts/ -f txt
      
      - name: Run Safety vulnerability scan
        run: |
          safety check --json --output safety-report.json || true
          safety check
      
      - name: Upload Bandit results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: bandit-report.json
        continue-on-error: true
      
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: python, javascript
        continue-on-error: true
      
      - name: Security summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Bandit security scan completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Safety vulnerability scan completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CodeQL analysis completed" >> $GITHUB_STEP_SUMMARY

  # Python testing
  test-python:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        exclude:
          - os: windows-latest
            python-version: '3.8'
          - os: macos-latest
            python-version: '3.8'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with coverage
        run: |
          pytest --cov=scripts --cov-report=xml --cov-report=term-missing --junit-xml=junit.xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-python-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            junit.xml
            coverage.xml

  # TypeScript testing
  test-typescript:
    name: TypeScript Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['16', '18', '20']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Run tests with coverage
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '18'
        with:
          file: ./coverage/lcov.info
          flags: typescript
          name: typescript-${{ matrix.node-version }}
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-typescript-${{ matrix.os }}-${{ matrix.node-version }}
          path: |
            coverage/junit.xml
            coverage/lcov.info

  # Integration testing
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality-gates, test-python, test-typescript]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci
          npm run build
      
      - name: Test Python script execution
        run: |
          python scripts/gen_sparkline.py --use-sample-data --output test-sparkline.svg
          test -f test-sparkline.svg
          echo "✅ Python sparkline generation successful"
      
      - name: Test TypeScript script execution
        run: |
          node dist/scripts/gen_radar.js --use-sample-data --output test-radar.svg
          test -f test-radar.svg
          echo "✅ TypeScript radar generation successful"
      
      - name: Validate SVG outputs
        run: |
          # Check SVG structure
          grep -q "<svg" test-sparkline.svg
          grep -q "</svg>" test-sparkline.svg
          grep -q "<svg" test-radar.svg
          grep -q "</svg>" test-radar.svg
          echo "✅ SVG validation successful"
      
      - name: Performance benchmarking
        run: |
          echo "## Performance Benchmarks" >> $GITHUB_STEP_SUMMARY
          
          # Python performance
          time python scripts/gen_sparkline.py --use-sample-data > /dev/null
          echo "- Python sparkline generation completed" >> $GITHUB_STEP_SUMMARY
          
          # TypeScript performance
          time node dist/scripts/gen_radar.js --use-sample-data > /dev/null
          echo "- TypeScript radar generation completed" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload integration artifacts
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-outputs
          path: |
            test-sparkline.svg
            test-radar.svg

  # Dependency vulnerability scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety
          npm ci
      
      - name: Python dependency audit
        run: |
          safety check --json --output python-vulnerabilities.json || true
          safety check || echo "Python vulnerabilities found"
      
      - name: Node.js dependency audit
        run: |
          npm audit --audit-level moderate --json > npm-audit.json || true
          npm audit --audit-level moderate || echo "Node.js vulnerabilities found"
      
      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: vulnerability-reports
          path: |
            python-vulnerabilities.json
            npm-audit.json

  # Build and package
  build-package:
    name: Build and Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality-gates, security-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build
          npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Build Python package
        run: python -m build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            dist/
            coverage/

  # Final status check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality-gates, security-scan, test-python, test-typescript, integration-tests, dependency-scan, build-package]
    if: always()
    
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.quality-gates.result }}" == "success" && \
                "${{ needs.security-scan.result }}" == "success" && \
                "${{ needs.test-python.result }}" == "success" && \
                "${{ needs.test-typescript.result }}" == "success" && \
                "${{ needs.integration-tests.result }}" == "success" && \
                "${{ needs.dependency-scan.result }}" == "success" && \
                "${{ needs.build-package.result }}" == "success" ]]; then
            echo "✅ All CI checks passed successfully!"
            echo "## 🎉 CI Pipeline Success" >> $GITHUB_STEP_SUMMARY
            echo "All quality gates, tests, and security scans completed successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some CI checks failed"
            echo "## ❌ CI Pipeline Failed" >> $GITHUB_STEP_SUMMARY
            echo "One or more checks failed. Please review the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi