name: GitHub Metrics Generation

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/metrics.yml'

env:
  METRICS_VERSION: 'latest'

jobs:
  github-metrics:
    name: Generate GitHub Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: read
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          fetch-depth: 0
      
      - name: Generate comprehensive metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: senpai-sama7
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          config_output: github-metrics.svg
          config_display: large
          
          # Plugin configurations with error handling
          plugin_languages: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 12
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 500
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%
          plugin_languages_details: bytes-size, percentage, lines
          
          plugin_activity: yes
          plugin_activity_days: 30
          plugin_activity_filter: all
          plugin_activity_limit: 8
          plugin_activity_load: 500
          plugin_activity_visibility: all
          
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_achievements_limit: 10
          
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes
          
          plugin_discussions: yes
          plugin_discussions_categories: yes
          
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes
          
          plugin_lines: yes
          plugin_lines_history_limit: 3
          plugin_lines_repositories_limit: 8
          plugin_lines_sections: base, repositories, history
          
          plugin_traffic: yes
          plugin_traffic_skipped: senpai-sama7
          
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
          plugin_people_identicons: yes
          plugin_people_shuffle: yes
          
          plugin_sponsors: yes
          plugin_sponsors_sections: goal, list, about
          
          plugin_repositories: yes
          plugin_repositories_order: featured, pinned, starred, random
          plugin_repositories_forks: yes
          plugin_repositories_affiliations: owner, collaborator, organization_member
          
          plugin_introduction: yes
          plugin_introduction_title: yes
          
          plugin_calendar: yes
          plugin_calendar_limit: 3
          
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes
          
          plugin_contributors: yes
          plugin_contributors_base: ""
          plugin_contributors_head: main
          plugin_contributors_ignored: bot
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors, categories
          
          plugin_gists: yes
          
          plugin_projects: yes
          plugin_projects_limit: 4
          plugin_projects_descriptions: yes
          
          plugin_code: yes
          plugin_code_lines: 12
          plugin_code_load: 400
          plugin_code_days: 7
          plugin_code_visibility: public
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          plugin_skyline: yes
          plugin_skyline_year: current-year
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.5
          plugin_skyline_compatibility: yes
      
      - name: Validate generated metrics
        run: |
          if [[ -f "github-metrics.svg" ]]; then
            echo "✅ Metrics file generated successfully"
            
            # Validate SVG structure
            if grep -q "<svg" github-metrics.svg && grep -q "</svg>" github-metrics.svg; then
              echo "✅ SVG structure is valid"
            else
              echo "❌ Invalid SVG structure"
              exit 1
            fi
            
            # Check file size (should be reasonable)
            file_size=$(stat -c%s github-metrics.svg)
            if [[ $file_size -gt 100 && $file_size -lt 10485760 ]]; then  # 100 bytes to 10MB
              echo "✅ File size is reasonable: $file_size bytes"
            else
              echo "❌ File size is suspicious: $file_size bytes"
              exit 1
            fi
            
            # Log metrics generation summary
            echo "## 📊 Metrics Generation Summary" >> $GITHUB_STEP_SUMMARY
            echo "- **File Size**: $(numfmt --to=iec $file_size)" >> $GITHUB_STEP_SUMMARY
            echo "- **Generated**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
            echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
            
          else
            echo "❌ Metrics file was not generated"
            echo "## ❌ Metrics Generation Failed" >> $GITHUB_STEP_SUMMARY
            echo "The metrics file was not generated. Check the logs for errors." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      
      - name: Commit and push metrics
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git add github-metrics.svg
            git commit -m "feat: update GitHub metrics

            - Generated comprehensive metrics with $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            - Includes activity, languages, achievements, and more
            - File size: $(stat -c%s github-metrics.svg) bytes
            
            [skip ci]"
            
            # Retry push with exponential backoff
            for i in {1..3}; do
              if git push; then
                echo "✅ Metrics pushed successfully"
                break
              else
                echo "⚠️ Push failed, retrying in $((2**i)) seconds..."
                sleep $((2**i))
                git pull --rebase
              fi
            done
          else
            echo "ℹ️ No changes to commit"
          fi
      
      - name: Create metrics artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: github-metrics
          path: github-metrics.svg
          retention-days: 30
      
      - name: Performance monitoring
        run: |
          echo "## 🔍 Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Duration**: ${{ github.event.workflow_run.conclusion == 'success' && 'Success' || 'In Progress' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Plugins Enabled**: 20+" >> $GITHUB_STEP_SUMMARY
          echo "- **Data Sources**: GitHub API, Git History, Repository Analysis" >> $GITHUB_STEP_SUMMARY

  # Backup metrics to different branch
  backup-metrics:
    name: Backup Metrics
    runs-on: ubuntu-latest
    needs: github-metrics
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          fetch-depth: 0
      
      - name: Download metrics artifact
        uses: actions/download-artifact@v3
        with:
          name: github-metrics
      
      - name: Create backup branch
        run: |
          # Create or switch to metrics-backup branch
          git checkout -B metrics-backup
          
          # Create timestamped backup
          timestamp=$(date -u '+%Y%m%d_%H%M%S')
          mkdir -p backups
          cp github-metrics.svg "backups/github-metrics_${timestamp}.svg"
          
          # Keep only last 30 backups
          ls -t backups/github-metrics_*.svg | tail -n +31 | xargs -r rm
          
          git add backups/
          git commit -m "backup: metrics snapshot ${timestamp}" || echo "No changes to backup"
          git push origin metrics-backup --force
      
      - name: Cleanup old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10

  # Health check and monitoring
  health-check:
    name: Metrics Health Check
    runs-on: ubuntu-latest
    needs: github-metrics
    if: always()
    
    steps:
      - name: Check metrics generation status
        run: |
          if [[ "${{ needs.github-metrics.result }}" == "success" ]]; then
            echo "✅ Metrics generation successful"
            
            # Send success notification (if webhook configured)
            if [[ -n "${{ secrets.WEBHOOK_URL }}" ]]; then
              curl -X POST "${{ secrets.WEBHOOK_URL }}" \
                -H "Content-Type: application/json" \
                -d '{
                  "text": "✅ GitHub metrics updated successfully",
                  "username": "GitHub Actions",
                  "icon_emoji": ":chart_with_upwards_trend:"
                }' || echo "Webhook notification failed"
            fi
          else
            echo "❌ Metrics generation failed"
            
            # Send failure notification
            if [[ -n "${{ secrets.WEBHOOK_URL }}" ]]; then
              curl -X POST "${{ secrets.WEBHOOK_URL }}" \
                -H "Content-Type: application/json" \
                -d '{
                  "text": "❌ GitHub metrics generation failed",
                  "username": "GitHub Actions",
                  "icon_emoji": ":warning:"
                }' || echo "Webhook notification failed"
            fi
            
            exit 1
          fi
      
      - name: Update status badge
        run: |
          echo "## 📈 Metrics Status" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.github-metrics.result }}" == "success" ]]; then
            echo "![Metrics Status](https://img.shields.io/badge/metrics-up%20to%20date-brightgreen)" >> $GITHUB_STEP_SUMMARY
          else
            echo "![Metrics Status](https://img.shields.io/badge/metrics-failed-red)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY