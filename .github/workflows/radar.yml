name: Generate Radar Chart
on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

jobs:
  generate-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Generate radar chart
        run: |
          node scripts/gen_radar.js > assets/radar.svg
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/radar.svg
          git diff --staged --quiet || git commit -m "feat: update radar chart"
          git push