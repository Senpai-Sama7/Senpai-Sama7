<svg width="350" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f3"/>
      <stop offset="100%" style="stop-color:#e6e6ea"/>
    </linearGradient>
    <linearGradient id="activityGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="clayDepth">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="5" dy="5" result="offset1"/>
      <feFlood flood-color="#d1d1d6"/>
      <feComposite in2="offset1" operator="in"/>
      <feOffset dx="-3" dy="-3" result="offset2"/>
      <feFlood flood-color="#ffffff"/>
      <feComposite in2="offset2" operator="in"/>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card background -->
  <rect x="20" y="20" width="310" height="160" fill="url(#clayCard)" rx="20" filter="url(#clayDepth)"/>
  
  <!-- Title -->
  <text x="175" y="50" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="18" font-weight="700" fill="#333">
    Weekly Activity
  </text>
  
  <!-- Activity chart -->
  <g id="activityChart">
    <!-- Chart bars -->
    <rect x="40" y="120" width="8" height="30" fill="url(#activityGrad)" rx="4">
      <animate attributeName="height" values="30;45;30" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="55" y="110" width="8" height="40" fill="url(#activityGrad)" rx="4">
      <animate attributeName="height" values="40;55;40" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="70" y="125" width="8" height="25" fill="url(#activityGrad)" rx="4">
      <animate attributeName="height" values="25;40;25" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="85" y="100" width="8" height="50" fill="url(#activityGrad)" rx="4">
      <animate attributeName="height" values="50;65;50" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="100" y="115" width="8" height="35" fill="url(#activityGrad)" rx="4">
      <animate attributeName="height" values="35;50;35" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="115" y="105" width="8" height="45" fill="url(#activityGrad)" rx="4">
      <animate attributeName="height" values="45;60;45" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="130" y="95" width="8" height="55" fill="url(#activityGrad)" rx="4">
      <animate attributeName="height" values="55;70;55" dur="3.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Sparkline overlay -->
  <polyline points="44,135 59,125 74,140 89,115 104,130 119,120 134,110" 
            stroke="#667eea" stroke-width="3" fill="none" opacity="0.7">
    <animate attributeName="points" 
             values="44,135 59,125 74,140 89,115 104,130 119,120 134,110;44,130 59,120 74,135 89,110 104,125 119,115 134,105;44,135 59,125 74,140 89,115 104,130 119,120 134,110" 
             dur="6s" repeatCount="indefinite"/>
  </polyline>
  
  <!-- Stats -->
  <text x="200" y="90" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="12" font-weight="600" fill="#666">
    Commits: 247
  </text>
  <text x="200" y="110" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="12" font-weight="600" fill="#666">
    PRs: 89
  </text>
  <text x="200" y="130" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="12" font-weight="600" fill="#666">
    Issues: 156
  </text>
</svg>