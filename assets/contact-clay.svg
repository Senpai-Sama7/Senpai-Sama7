<svg width="600" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f3"/>
      <stop offset="100%" style="stop-color:#e6e6ea"/>
    </linearGradient>
    <linearGradient id="contactGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="contactGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="contactGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="clayButton">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="4" dy="4" result="offset1"/>
      <feFlood flood-color="#d1d1d6"/>
      <feComposite in2="offset1" operator="in"/>
      <feOffset dx="-3" dy="-3" result="offset2"/>
      <feFlood flood-color="#ffffff"/>
      <feComposite in2="offset2" operator="in"/>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#clayBg)" rx="20"/>
  
  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="20" font-weight="800" fill="#333">
    Let's Connect & Collaborate
  </text>
  
  <!-- Contact buttons -->
  <g id="contactButtons">
    <!-- LinkedIn -->
    <rect x="80" y="60" width="100" height="40" fill="url(#contactGrad1)" rx="20" filter="url(#clayButton)">
      <animate attributeName="fill" values="url(#contactGrad1);url(#contactGrad2);url(#contactGrad1)" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="85" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="14" font-weight="600" fill="white">LinkedIn</text>
    
    <!-- GitHub -->
    <rect x="200" y="60" width="100" height="40" fill="url(#contactGrad2)" rx="20" filter="url(#clayButton)">
      <animate attributeName="fill" values="url(#contactGrad2);url(#contactGrad3);url(#contactGrad2)" dur="8s" repeatCount="indefinite"/>
    </rect>
    <text x="250" y="85" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="14" font-weight="600" fill="white">GitHub</text>
    
    <!-- Email -->
    <rect x="320" y="60" width="100" height="40" fill="url(#contactGrad3)" rx="20" filter="url(#clayButton)">
      <animate attributeName="fill" values="url(#contactGrad3);url(#contactGrad1);url(#contactGrad3)" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="85" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="14" font-weight="600" fill="white">Email</text>
    
    <!-- Portfolio -->
    <rect x="440" y="60" width="100" height="40" fill="url(#contactGrad1)" rx="20" filter="url(#clayButton)">
      <animate attributeName="fill" values="url(#contactGrad1);url(#contactGrad3);url(#contactGrad1)" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="490" y="85" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="14" font-weight="600" fill="white">Portfolio</text>
  </g>
  
  <!-- Subtitle -->
  <text x="300" y="125" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="14" font-weight="500" fill="#666">
    Open to exciting opportunities and innovative projects
  </text>
  
  <!-- Floating elements -->
  <circle cx="50" cy="80" r="4" fill="#667eea" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="80" r="3" fill="#f093fb" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>