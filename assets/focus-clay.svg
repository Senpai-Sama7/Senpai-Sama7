<svg width="800" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f3"/>
      <stop offset="100%" style="stop-color:#e6e6ea"/>
    </linearGradient>
    <linearGradient id="focusGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="focusGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="focusGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="clayCard">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="6" dy="6" result="offset1"/>
      <feFlood flood-color="#d1d1d6"/>
      <feComposite in2="offset1" operator="in"/>
      <feOffset dx="-4" dy="-4" result="offset2"/>
      <feFlood flood-color="#ffffff"/>
      <feComposite in2="offset2" operator="in"/>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#clayBg)" rx="25"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="24" font-weight="800" fill="#333">
    Current Focus Areas
  </text>
  
  <!-- Focus cards -->
  <g id="focusCards">
    <!-- AI Research -->
    <rect x="60" y="70" width="200" height="80" fill="url(#focusGrad1)" rx="20" filter="url(#clayCard)">
      <animate attributeName="fill" values="url(#focusGrad1);url(#focusGrad2);url(#focusGrad1)" dur="8s" repeatCount="indefinite"/>
    </rect>
    <text x="160" y="95" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="16" font-weight="700" fill="white">🔬 AI Research</text>
    <text x="160" y="115" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="white" opacity="0.9">
      Machine Learning in Enterprise
    </text>
    <text x="160" y="130" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="white" opacity="0.9">
      Applications & Architecture
    </text>
    
    <!-- Cloud Native -->
    <rect x="300" y="70" width="200" height="80" fill="url(#focusGrad2)" rx="20" filter="url(#clayCard)">
      <animate attributeName="fill" values="url(#focusGrad2);url(#focusGrad3);url(#focusGrad2)" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text x="400" y="95" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="16" font-weight="700" fill="white">☁️ Cloud Native</text>
    <text x="400" y="115" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="white" opacity="0.9">
      Kubernetes & Microservices
    </text>
    <text x="400" y="130" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="white" opacity="0.9">
      Infrastructure as Code
    </text>
    
    <!-- Open Source -->
    <rect x="540" y="70" width="200" height="80" fill="url(#focusGrad3)" rx="20" filter="url(#clayCard)">
      <animate attributeName="fill" values="url(#focusGrad3);url(#focusGrad1);url(#focusGrad3)" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text x="640" y="95" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="16" font-weight="700" fill="white">🌐 Open Source</text>
    <text x="640" y="115" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="white" opacity="0.9">
      Developer Tools & Libraries
    </text>
    <text x="640" y="130" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="white" opacity="0.9">
      Community Building
    </text>
  </g>
  
  <!-- Floating elements -->
  <circle cx="50" cy="200" r="8" fill="#667eea" opacity="0.2">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0;15,-10;0,0" dur="8s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="750" cy="60" r="6" fill="#f093fb" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0;-10,10;0,0" dur="10s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Subtitle -->
  <text x="400" y="200" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="16" font-weight="500" fill="#666">
    Driving innovation through cutting-edge technology and collaborative development
  </text>
</svg>