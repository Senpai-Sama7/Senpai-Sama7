<svg width="800" height="240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f3"/>
      <stop offset="100%" style="stop-color:#cacace"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea">
        <animate attributeName="stop-color" values="#667eea;#764ba2;#f093fb;#f5576c;#4facfe;#00f2fe;#667eea" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#764ba2">
        <animate attributeName="stop-color" values="#764ba2;#f093fb;#f5576c;#4facfe;#00f2fe;#667eea;#764ba2" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="clayInset">
      <feOffset in="SourceGraphic" dx="0" dy="0"/>
      <feGaussianBlur stdDeviation="3"/>
      <feFlood flood-color="#bebebe"/>
      <feComposite operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
    <filter id="clayEmboss">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="8" dy="8" result="offset1"/>
      <feFlood flood-color="#bebebe"/>
      <feComposite in2="offset1" operator="in"/>
      <feOffset dx="-8" dy="-8" result="offset2"/>
      <feFlood flood-color="#ffffff"/>
      <feComposite in2="offset2" operator="in"/>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Clay background -->
  <rect width="100%" height="100%" fill="url(#clayBg)" rx="30" filter="url(#clayEmboss)"/>
  
  <!-- Floating elements -->
  <circle cx="150" cy="60" r="20" fill="#667eea" opacity="0.1" filter="url(#clayInset)">
    <animateTransform attributeName="transform" type="translate" values="0,0;10,-5;0,0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="180" r="15" fill="#f093fb" opacity="0.1" filter="url(#clayInset)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-8,8;0,0" dur="8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main text -->
  <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" 
        font-family="SF Pro Display, -apple-system, system-ui, sans-serif" 
        font-size="48" font-weight="900" fill="url(#textGrad)" filter="url(#glow)">
    SENPAI-SAMA7
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- Subtitle -->
  <text x="50%" y="65%" text-anchor="middle" dominant-baseline="middle" 
        font-family="SF Pro Display, -apple-system, system-ui, sans-serif" 
        font-size="18" font-weight="600" fill="#666" opacity="0.8">
    Senior Software Architect & AI Engineer
  </text>
  
  <!-- Decorative elements -->
  <path d="M100,200 Q400,180 700,200" stroke="url(#textGrad)" stroke-width="3" fill="none" opacity="0.3">
    <animate attributeName="d" values="M100,200 Q400,180 700,200;M100,200 Q400,220 700,200;M100,200 Q400,180 700,200" dur="10s" repeatCount="indefinite"/>
  </path>
</svg>