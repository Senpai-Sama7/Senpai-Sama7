<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1">
        <animate attributeName="stop-color" values="#667eea;#764ba2;#f093fb;#f5576c;#4facfe;#00f2fe;#43e97b;#38f9d7;#667eea" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="25%" style="stop-color:#764ba2;stop-opacity:1">
        <animate attributeName="stop-color" values="#764ba2;#f093fb;#f5576c;#4facfe;#00f2fe;#43e97b;#38f9d7;#667eea;#764ba2" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#f093fb;stop-opacity:1">
        <animate attributeName="stop-color" values="#f093fb;#f5576c;#4facfe;#00f2fe;#43e97b;#38f9d7;#667eea;#764ba2;#f093fb" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" style="stop-color:#4facfe;stop-opacity:1">
        <animate attributeName="stop-color" values="#4facfe;#00f2fe;#43e97b;#38f9d7;#667eea;#764ba2;#f093fb;#f5576c;#4facfe" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1">
        <animate attributeName="stop-color" values="#00f2fe;#43e97b;#38f9d7;#667eea;#764ba2;#f093fb;#f5576c;#4facfe;#00f2fe" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shimmer">
      <feOffset in="SourceGraphic" dx="0" dy="0" result="offset"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.3"/>
      <feComposite in="flood" in2="offset" operator="in"/>
      <feGaussianBlur stdDeviation="2"/>
      <animateTransform attributeName="transform" type="translate" values="-100 0;900 0;-100 0" dur="8s" repeatCount="indefinite"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#heroGradient)" filter="url(#glow)" rx="15"/>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" 
        font-family="JetBrains Mono, monospace" font-size="42" font-weight="800" fill="white" filter="url(#glow)">
    SENPAI-SAMA7
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
  </text>
  <rect width="100%" height="100%" fill="url(#shimmer)" rx="15" opacity="0.1"/>
</svg>