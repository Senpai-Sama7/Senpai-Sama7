<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f3"/>
      <stop offset="100%" style="stop-color:#e6e6ea"/>
    </linearGradient>
    <linearGradient id="metricsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <filter id="clayCard">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="6" dy="6" result="offset1"/>
      <feFlood flood-color="#d1d1d6"/>
      <feComposite in2="offset1" operator="in"/>
      <feOffset dx="-4" dy="-4" result="offset2"/>
      <feFlood flood-color="#ffffff"/>
      <feComposite in2="offset2" operator="in"/>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card background -->
  <rect x="20" y="20" width="560" height="160" fill="url(#clayBg)" rx="25" filter="url(#clayCard)"/>
  
  <!-- Title -->
  <text x="300" y="55" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="22" font-weight="800" fill="url(#metricsGrad)">
    GitHub Metrics Dashboard
  </text>
  
  <!-- Metrics grid -->
  <g id="metricsGrid">
    <!-- Metric cards -->
    <rect x="50" y="80" width="100" height="60" fill="url(#clayBg)" rx="15" filter="url(#clayCard)"/>
    <text x="100" y="100" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="#667eea">247</text>
    <text x="100" y="120" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="#666">Commits</text>
    
    <rect x="170" y="80" width="100" height="60" fill="url(#clayBg)" rx="15" filter="url(#clayCard)"/>
    <text x="220" y="100" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="#764ba2">89</text>
    <text x="220" y="120" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="#666">Pull Requests</text>
    
    <rect x="290" y="80" width="100" height="60" fill="url(#clayBg)" rx="15" filter="url(#clayCard)"/>
    <text x="340" y="100" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="#f093fb">156</text>
    <text x="340" y="120" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="#666">Issues Closed</text>
    
    <rect x="410" y="80" width="100" height="60" fill="url(#clayBg)" rx="15" filter="url(#clayCard)"/>
    <text x="460" y="100" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="#4facfe">42</text>
    <text x="460" y="120" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="12" font-weight="500" fill="#666">Repositories</text>
  </g>
  
  <!-- Animated elements -->
  <circle cx="530" cy="50" r="6" fill="#667eea" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0;5,-3;0,0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <text x="300" y="170" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="14" font-weight="500" fill="#666" opacity="0.8">
    Updated automatically via GitHub Actions
  </text>
</svg>