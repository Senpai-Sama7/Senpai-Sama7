<svg width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="clayCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f3"/>
      <stop offset="100%" style="stop-color:#e6e6ea"/>
    </linearGradient>
    <linearGradient id="typeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea">
        <animate attributeName="stop-color" values="#667eea;#4facfe;#00f2fe;#43e97b;#667eea" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#764ba2">
        <animate attributeName="stop-color" values="#764ba2;#f093fb;#f5576c;#4facfe;#764ba2" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="clayDepth">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="6" dy="6" result="offset1"/>
      <feFlood flood-color="#d1d1d6"/>
      <feComposite in2="offset1" operator="in"/>
      <feOffset dx="-6" dy="-6" result="offset2"/>
      <feFlood flood-color="#ffffff"/>
      <feComposite in2="offset2" operator="in"/>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Clay card background -->
  <rect x="50" y="20" width="700" height="80" fill="url(#clayCard)" rx="25" filter="url(#clayDepth)"/>
  
  <!-- Typing text container -->
  <g id="typingContainer">
    <!-- Text lines that animate in sequence -->
    <text x="400" y="45" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="url(#typeGrad)">
      <animate attributeName="opacity" values="0;1;1;0" dur="12s" repeatCount="indefinite" begin="0s"/>
      Enterprise Solutions Architect
    </text>
    
    <text x="400" y="45" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="url(#typeGrad)">
      <animate attributeName="opacity" values="0;0;1;1;0" dur="12s" repeatCount="indefinite" begin="2s"/>
      AI & Machine Learning Engineer
    </text>
    
    <text x="400" y="45" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="url(#typeGrad)">
      <animate attributeName="opacity" values="0;0;0;1;1;0" dur="12s" repeatCount="indefinite" begin="4s"/>
      Cloud Infrastructure Specialist
    </text>
    
    <text x="400" y="45" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="url(#typeGrad)">
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" dur="12s" repeatCount="indefinite" begin="6s"/>
      Open Source Maintainer
    </text>
    
    <text x="400" y="45" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
          font-size="20" font-weight="700" fill="url(#typeGrad)">
      <animate attributeName="opacity" values="0;0;0;0;0;1;1" dur="12s" repeatCount="indefinite" begin="8s"/>
      Innovation Catalyst
    </text>
  </g>
  
  <!-- Cursor -->
  <rect x="500" y="35" width="3" height="20" fill="url(#typeGrad)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0;50,0;-30,0;20,0;-40,0" dur="12s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Subtitle -->
  <text x="400" y="75" text-anchor="middle" font-family="SF Pro Display, system-ui, sans-serif" 
        font-size="14" font-weight="500" fill="#666" opacity="0.7">
    Building the future of technology
  </text>
</svg>