<svg width="800" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      .typing-text {
        font-family: 'Courier New', monospace;
        font-size: 48px;
        font-weight: bold;
        fill: url(#textGrad);
        filter: url(#neonGlow);
      }
      .cursor {
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
    </style>
  </defs>
  
  <!-- Background glow -->
  <rect width="800" height="100" fill="rgba(0,0,0,0.05)" rx="10"/>
  
  <!-- Layered text for neon effect -->
  <text x="50" y="65" class="typing-text" opacity="0.5" transform="translate(2, 2)">
    &lt;Developer /&gt;
  </text>
  <text x="50" y="65" class="typing-text" opacity="0.7" transform="translate(1, 1)">
    &lt;Developer /&gt;
  </text>
  <text x="50" y="65" class="typing-text">
    &lt;Developer /&gt;
  </text>
  
  <!-- Blinking cursor -->
  <text x="500" y="65" class="typing-text cursor">|</text>
  
  <!-- Subtle animated underline -->
  <line x1="50" y1="75" x2="50" y2="75" stroke="url(#textGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <animate attributeName="x2" from="50" to="510" dur="2s" fill="freeze"/>
  </line>
</svg>
